<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>memo.js: Classic Board Game with jQuery</title>
    <link rel="apple-touch-icon" href="image/apple-touch-icon.png">
    <link rel="canonical" href="https://javier.beaumont.eus/memo.js/">
    <link rel="icon" type="image/svg+xml" href="image/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="image/favicon.png">
    <link rel="license" href="LICENSE">
    <link rel="preload" href="font/inter.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="style/memo.css">
    <script src="script/jquery.js" defer></script>
    <script src="script/memo.js" defer></script>
    <meta name="color-scheme" content="dark">
    <meta name="dcterms.rights" content="https://opensource.org/license/mit">
    <meta name="description" content="Play the classic Memory card game, built with jQuery: flip the cards, match every pair, and beat the clock.">
    <meta name="theme-color" content="#111111">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://javier.beaumont.eus/memo.js/image/og.png">
    <meta property="og:description" content="Play the classic Memory card game, built with jQuery: flip the cards, match every pair, and beat the clock.">
    <meta property="og:image:alt" content="memo.js: Classic Board Game with jQuery">
    <meta property="og:image:height" content="630">
    <meta property="og:image:width" content="1200">
    <meta property="og:image" content="https://javier.beaumont.eus/memo.js/image/og.png">
    <meta property="og:locale" content="en_US">
    <meta property="og:site_name" content="javier.beaumont.eus">
    <meta property="og:title" content="memo.js: Classic Board Game with jQuery">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://javier.beaumont.eus/memo.js/">
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "applicationCategory": "GameApplication",
      "author": { "@type": "Person", "name": "Javier Beaumont" },
      "browserRequirements": "Requires JavaScript",
      "description": "Play the classic Memory card game, built with jQuery: flip the cards, match every pair, and beat the clock.",
      "image": "https://javier.beaumont.eus/memo.js/image/og.png",
      "isAccessibleForFree": true,
      "license": "https://opensource.org/license/mit",
      "name": "memo.js: Classic Board Game with jQuery",
      "operatingSystem": "Any",
      "sameAs": "https://github.com/javierbeaumont/memo.js",
      "url": "https://javier.beaumont.eus/memo.js/"
    }
    </script>
  </head>
  <body>
    <div id="stats">
      <span>Level: <select id="level"></select></span>
      <span>Time: <b id="stats-time">0:00</b></span>
      <span>Attempts: <b id="stats-moves">0</b></span>
    </div>

    <div class="board" data-element="board"></div>

    <div id="win">
      <button id="win-close" type="button" aria-label="Close"></button>
      <h1>You won!</h1>
      <p>Level: <span id="win-level"></span></p>
      <p>Time: <span id="win-time"></span></p>
      <p>Attempts: <span id="win-moves"></span></p>
      <div class="win-actions">
        <button id="replay">Replay</button>
        <button id="next">Next</button>
      </div>
    </div>

    <footer class="stat-links">
      <span class="mark">memo.js</span>
      <a class="built" href="slides/" aria-label="See how it's built" title="See how it's built"></a>
      <a class="github" href="https://github.com/javierbeaumont/memo.js" aria-label="View the source" title="View the source"></a>
      <a class="license" href="LICENSE" rel="license noopener" target="_blank">MIT</a>
    </footer>
  </body>
</html>
